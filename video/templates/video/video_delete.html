{% extends 'video/base.html' %}
{% block video_active %}active{% endblock %}
{% block video_content %}
<div class="p-3 p-md-4 border rounded bg-light">
  <h4 class="mb-2">Conferma eliminazione</h4>
  <p class="text-muted mb-4">Vuoi eliminare il video <strong>{{ object.title }}</strong>? Questa azione è irreversibile.</p>
  <form action="." method="POST" class="d-flex align-items-center">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger mr-2">Elimina</button>
    <a href="../" class="btn btn-outline-secondary">Annulla</a>
  </form>
</div>
{% endblock %}
