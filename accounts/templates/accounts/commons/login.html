{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Login Page{% endblock title %}

{% block content %} 
<div class="col-md-6">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-row">
            <div class="form-group col-md-6 mb-0">
                {{ form.username|as_crispy_field }}
            </div>
            <div class="form-group col-md-6 mb-0">
                {{ form.password|as_crispy_field }}
            </div>
        </div>
        <button type="submit" class="btn btn-success">Login</button>
    </form>
</div>

<div style="margin-top:10px">
            <a href="{% url 'accounts:password_reset' %}" class="btn btn-primary">Password Dimenticata</a>
            <a href="{% url 'accounts:signup' %}" class="btn btn-primary">Registrati</a>
            <a href="{% url 'home' %}" class="btn btn-default btn-primary">Home</a>
</div>
{% endblock content %}
