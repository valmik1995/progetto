{% extends 'base.html' %}

{% block content %}
<style>
  .wm-shell {
    --wm-bg: linear-gradient(140deg, #fff7ed 0%, #f8fafc 50%, #eff6ff 100%);
    --wm-card: #ffffff;
    --wm-border: rgba(30, 41, 59, 0.08);
    --wm-text: #1e293b;
    --wm-muted: #64748b;
    color: var(--wm-text);
  }
  .wm-hero {
    background: var(--wm-bg);
    border: 1px solid var(--wm-border);
    border-radius: 16px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .wm-surface {
    background: var(--wm-card);
    border: 1px solid var(--wm-border);
    border-radius: 16px;
    box-shadow: 0 8px 28px rgba(15, 23, 42, 0.05);
  }
  .wm-muted { color: var(--wm-muted); }
</style>

<div class="wm-shell">
  <div class="wm-hero d-flex flex-wrap align-items-center justify-content-between">
    <div>
      <h2 class="mb-1">Watermarks Studio</h2>
      <p class="mb-0 wm-muted">Carica immagini, applica watermark e scarica i risultati.</p>
    </div>
  </div>

  <div class="row">

    {% block watermarks_content %}
    {% endblock %}
  
  
  </div>
</div>

{% endblock %}
