    {% block sidebar %}
    <div class="col-md-3">
        <div class="panel panel-default">
            <div class="panel-heading">
                <h3 class="panel-title">Examples</h3>
            </div>
            <div class="list-group">
                <a href="{% url 'foto:basic_upload' %}"
                    class="list-group-item{% if request.path == '/basic-upload/' %} active{% endif %}">
                    Watermaks Semplice
                </a>
                <a href="{% url 'foto:basic_upload_heic' %}"
                    class="list-group-item{% if request.path == '/basic-upload-heic/' %} active{% endif %}">
                    Image Heic
                </a>
            </div>
            <div class="list-group mt-4">
                {% if request.path == '/basic-upload/' %}
                <form method="post" action="{% url 'foto:clear_database' %}">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ request.path }}">
                    <button type="submit" class="btn btn-danger pull-right">
                        <span class="glyphicon glyphicon-trash"></span> Cancella Photo
                    </button>
                </form>
                {% elif request.path == '/basic-upload-heic/' %}
                <form method="post" action="{% url 'foto:clear_database_heic' %}">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ request.path }}">
                    <button type="submit" class="btn btn-danger pull-right">
                        <span class="glyphicon glyphicon-trash"></span> Cancella Photo iPhone
                    </button>
                </form>
                {% endif %}
            </div>
        </div>
    </div>
    {% endblock %}
